<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Mohamed Afzhal Khan Portfolio</title>

<meta name="description" content="Login page for portfolio website">
<meta name="keywords" content="Login, Portfolio, Web Developer">
<meta name="author" content="Mohamed Afzhal Khan">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
}

.skip-link{
    position:absolute;
    left:-9999px;
}

.skip-link:focus{
    left:20px;
    top:20px;
    background:white;
    color:black;
    padding:10px;
    border-radius:5px;
}

.login-container{
    width:90%;
    max-width:1200px;
    min-height:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    overflow:hidden;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.left-panel{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:60px;
}

.left-panel h1{
    font-size:3rem;
    margin-bottom:20px;
}

.left-panel p{
    font-size:1.2rem;
    line-height:1.8;
}

.right-panel{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.login-card{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(25px);
    border-radius:20px;
    padding:40px;
    border:1px solid rgba(255,255,255,.2);
}

.login-card h2{
    text-align:center;
    color:white;
    margin-bottom:10px;
    font-size:2rem;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-bottom:20px;
    background:rgba(255,255,255,.15);
    color:white;
    outline:none;
}

input:focus{
    border:2px solid #38bdf8;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(56,189,248,.5);
}

.extra-links{
    text-align:center;
    margin-top:20px;
}

.extra-links a{
    color:#38bdf8;
    text-decoration:none;
}

.extra-links a:hover{
    text-decoration:underline;
}

footer{
    display:none;
}

@media(max-width:900px){

    .login-container{
        grid-template-columns:1fr;
    }

    .left-panel{
        text-align:center;
        padding:40px;
    }

    .left-panel h1{
        font-size:2rem;
    }
}
</style>

</head>

<body>

<a href="#main-content" class="skip-link">
Skip to Main Content
</a>

<div class="login-container">

    <div class="left-panel">
        <h1>Mohamed Afzhal Khan</h1>
        <p>
            Welcome to my Portfolio Website.
            Explore my projects, skills, achievements,
            certifications, and professional journey in
            Web Development and Software Engineering.
        </p>
    </div>

    <main id="main-content" class="right-panel">

        <section class="login-card" aria-labelledby="login-heading">

            <h2 id="login-heading">Welcome Back</h2>

            <p class="subtitle">
                Login to continue
            </p>

            <form action="index.html" method="post">

                <label for="email">
                    Email Address
                </label>

                <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required>

                <label for="password">
                    Password
                </label>

                <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required>

                <button type="submit">
                    Login
                </button>

            </form>

            <div class="extra-links">
                <p>
                    <a href="#">Forgot Password?</a>
                </p>
            </div>

        </section>

    </main>

</div>

</body>
</html>
